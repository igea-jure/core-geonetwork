<div data-ng-if="mdView.current.record.specificationConformance">
  <h2 data-translate="">specificationConformance</h2>

  <ul class="gn-md-side list-unstyled">
    <li
      class="list-group-ite1m flex-row"
      data-ng-repeat="c in mdView.current.record.specificationConformance"
      title="{{c.explanation}}"
    >
      <span
        class="badge badge-rounded"
        data-ng-class="{
             'bg-success': c.pass == 'true',
             '': c.pass == '',
             'bg-danger': c.pass == 'false'
             }"
      >
        <i
          class="fa fa-fw"
          data-ng-class="{
             'fa-check': c.pass == 'true',
             '': c.pass == '',
             'fa-times': c.pass == 'false'
             }"
        ></i>
      </span>
      <a
        data-ng-if="::((c.codeSpace === 'SOP' && c.code) || (c.codeSpace === 'EU' && c.code) || c.link)"
        data-ng-href="{{
          (c.codeSpace === 'SOP' && c.code) ?
            ('https://pisrs.si/pregledPredpisa?sop=' + c.code) :
          (c.codeSpace === 'EU' && c.code) ?
            ('https://eur-lex.europa.eu/legal-content/' + ((lang === 'slv' || lang === 'sl') ? 'SL' : 'EN') + '/TXT/?uri=' + c.code) :
            c.link
        }}"
        target="_blank"
        rel="noopener noreferrer"
        >{{c.title}}</a
      >
      <span
        data-ng-if="::!((c.codeSpace === 'SOP' && c.code) || (c.codeSpace === 'EU' && c.code) || c.link)"
        >{{c.title}}</span
      >
    </li>
  </ul>
</div>
